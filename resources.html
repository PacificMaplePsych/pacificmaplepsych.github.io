  <!-- Page-specific styling to match services page -->
  <style>
    .resources-page .resources-wrap {
      padding: clamp(34px, 5vw, 64px) 0;
      background: #fff;
    }

    .resources-page .resources-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 34px 34px;
      align-items: start;
    }

    .resources-page .resource-tile {
      display: block;
      text-decoration: none;
      color: #111;
    }

    .resources-page .resource-tile img {
      width: 100%;
      height: 240px;
      display: block;
      object-fit: cover;
      object-position: center;
      border: 0;
    }

    .resources-page .resource-tile .resource-caption {
      background: var(--home-plum);
      padding: 12px 14px;
      text-align: center;
      font-weight: 800;
      font-size: 14px;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .resources-page .resource-tile:focus-visible {
      outline: 3px solid rgba(122, 93, 124, 0.55);
      outline-offset: 4px;
      border-radius: 6px;
    }

    @media (max-width: 900px) {
      .resources-page .resources-grid {
        grid-template-columns: 1fr;
        gap: 22px;
      }

      .resources-page .resource-tile img {
        height: 220px;
      }
    }
  </style>

  <div id="site-header"></div>

  <main class="entry-content about-page resources-page">

    <!-- TOP TITLE BAND -->
    <section class="page-title-band" aria-label="Resources title">
      <div class="container-narrow">
        <h1>Resources</h1>
      </div>
    </section>

    <!-- 2 clickable resource boxes -->
    <section class="resources-wrap" aria-label="Resources list">
      <div class="container-narrow">
        <div class="resources-grid">

          <a class="resource-tile" href="https://pacificmaplepsych.com/resources/disability.html" aria-label="Disability Resources">
            <img
              src="https://pacificmaplepsych.com/images/resources-disability.jpg"
              alt="Disability resources"
              loading="lazy"
              decoding="async"
            />
            <div class="resource-caption">Disability Resources</div>
          </a>

          <a class="resource-tile" href="https://pacificmaplepsych.com/resources/abuse.html" aria-label="Abuse Resources">
            <img
              src="https://pacificmaplepsych.com/images/resources-abuse.jpg"
              alt="Abuse resources"
              loading="lazy"
              decoding="async"
            />
            <div class="resource-caption">Abuse Resources</div>
          </a>

        </div>
      </div>
    </section>

  </main>

  <div id="site-footer"></div>

  <script src="/assets/main.js" defer></script>
